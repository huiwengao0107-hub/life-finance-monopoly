<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>人生理財大富翁 V6｜正式版</title>
<style>
:root{--ink:#172033;--paper:#fffaf1;--blue:#1d63d5;--shadow:0 12px 32px rgba(20,32,60,.18)}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#eef3f8;color:var(--ink);font-size:17px}
header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 18px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);position:sticky;top:0;z-index:20}
h1{font-size:22px;margin:0}.sub{font-size:13px;color:#667085}
button{border:0;border-radius:12px;padding:13px 18px;font-weight:800;cursor:pointer;font-size:17px}
button:disabled{opacity:.45;cursor:not-allowed}
.primary{background:#1262d6;color:#fff}.secondary{background:#e9eef6;color:#20304a}.danger{background:#c93d4b;color:#fff}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 370px;gap:16px;padding:16px;max-width:1800px;margin:auto}
.board-wrap{position:relative;width:100%;aspect-ratio:1536/1024;background:#ddd;border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.board{position:absolute;inset:0;width:100%;height:100%;object-fit:fill}
.token{position:absolute;width:4.2%;aspect-ratio:1;display:grid;place-items:center;font-size:clamp(25px,3.5vw,58px);filter:drop-shadow(0 3px 4px rgba(0,0,0,.55));transform:translate(-50%,-50%);transition:left .32s ease,top .32s ease;z-index:8}
.token::after{content:""}

.side{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 6px 20px rgba(20,32,60,.11)}
.turn{border:3px solid #ffd34d;background:#fff9d9}
.player{padding:11px;border-radius:12px;background:#f6f8fb;margin-top:8px;border:2px solid transparent}
.player.active{border-color:#ffbd13;background:#fff9df}
.player-row{display:flex;justify-content:space-between;gap:8px;font-weight:900}
.money{font-size:18px}.small{font-size:14px;color:#667085;margin-top:5px;line-height:1.5}
.dice{height:92px;display:grid;place-items:center;font-size:58px;background:#f6f8fb;border-radius:14px;margin:10px 0}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.log{max-height:190px;overflow:auto;font-size:13px;line-height:1.55;background:#f7f9fc;padding:10px;border-radius:12px}
.log div{border-bottom:1px dashed #d7deea;padding:5px 0}
.manual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
input{width:100%;border:1px solid #ccd5e1;border-radius:10px;padding:9px;font-size:14px}
.modal{position:fixed;inset:0;background:rgba(8,17,33,.68);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal.show{display:flex}
.modal-box{width:min(900px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:22px;padding:30px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.modal-title{font-size:32px;font-weight:900;margin-bottom:14px}.modal-text{font-size:26px;line-height:1.65;background:#fff8e8;padding:24px;border-radius:14px;white-space:pre-wrap}
.modal-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;margin-top:16px}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#eaf1ff;color:#1457b7;font-size:12px;font-weight:900}
.rank{font-size:20px;line-height:1.9}
.ranking-list{display:grid;gap:7px;font-weight:900}.ranking-item{display:flex;justify-content:space-between;background:#f4f7fb;border-radius:10px;padding:9px}.host-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.host-grid select,.host-grid input{font-size:16px;padding:10px;border:1px solid #ccd5e1;border-radius:10px;width:100%}.timer{font-size:46px;font-weight:900;text-align:center;color:#c93d4b;margin-top:10px}.timer-controls{display:flex;gap:8px;justify-content:center;margin-top:8px}.screen{position:fixed;inset:0;overflow-y:auto;z-index:100;background:linear-gradient(135deg,#0d4aa7,#743dc2);display:grid;place-items:center;padding:24px}.screen.hidden{display:none}.home-box{width:min(950px,94vw);padding:54px;text-align:center;border-radius:32px;background:#fff;box-shadow:0 28px 90px #0006}.home-box h1{font-size:clamp(40px,6vw,76px);color:#164b9b}.home-box p{font-size:25px}.home-box button{font-size:28px;padding:20px 48px}.projection{background:#111}.projection .layout{max-width:none;padding:8px;grid-template-columns:minmax(0,1fr) 440px}.projection .log-card{display:none}.projection button{font-size:20px;padding:15px}.projection .modal-box{width:min(1100px,98vw)}.projection .modal-text{font-size:34px}.status-note{padding:10px;border-radius:10px;background:#fff2bf;font-weight:900;text-align:center;margin-top:9px}.money-pop{animation:moneyPop .75s ease}.token.moving{animation:tokenBounce .32s ease}.modal.show .modal-box{animation:cardFlip .45s ease}.goal-celebrate{animation:goalPulse .75s ease infinite alternate}@keyframes moneyPop{50%{transform:scale(1.16);background:#fff0a8}}@keyframes tokenBounce{50%{transform:translate(-50%,-65%) scale(1.22)}}@keyframes cardFlip{from{opacity:0;transform:perspective(900px) rotateY(75deg) scale(.85)}to{opacity:1;transform:none}}@keyframes goalPulse{to{transform:scale(1.04);filter:drop-shadow(0 0 18px #ffd400)}}
@media(max-width:980px){.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}.side .card:last-child{grid-column:1/-1}}
@media(max-width:650px){header{align-items:flex-start;flex-direction:column}.layout{padding:8px}.side{display:flex}.token{width:7%}h1{font-size:19px}}
.mp-box{margin-top:18px;padding:16px;border:2px solid #dbe7f7;border-radius:16px;background:#f7fbff}.mp-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.room-code{font-size:28px;font-weight:900;letter-spacing:2px;color:#164b9b}.join-link{word-break:break-all;font-size:13px;color:#526071}.player-screen{position:fixed;inset:0;overflow-y:auto;z-index:200;background:linear-gradient(145deg,#0d4aa7,#743dc2);display:none;place-items:center;padding:18px}.player-screen.show{display:grid}.player-panel{width:min(520px,96vw);background:#fff;border-radius:26px;padding:28px;box-shadow:0 24px 70px #0006;text-align:center}.animal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.animal-btn{font-size:36px;padding:10px;border:3px solid transparent;background:#f3f6fb}.animal-btn.selected{border-color:#1262d6;background:#e8f1ff}.player-animal{font-size:90px}.player-status{font-size:20px;font-weight:900;margin:14px 0}.player-roll{width:100%;font-size:28px;padding:20px}.online-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#18a558;margin-right:6px}
</style>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<div class="screen" id="homeScreen"><div class="home-box"><div style="font-size:13px;font-weight:800;color:#64748b;margin-bottom:8px">V6 正式版</div><div style="font-size:76px">🎲🐾🏦</div><h1>人生理財大富翁</h1><p>三組一起挑戰理財任務，學會規劃、合作與聰明選擇！</p><div class="mp-actions"><button class="primary" onclick="startHostRoom()">📡 建立多人房間</button><button class="secondary" onclick="startGame()">🖥️ 單機開始</button></div><div class="mp-box" id="roomBox" style="display:none"><div><span class="online-dot"></span>多人房間已開啟</div><div class="room-code" id="roomCode">建立中…</div><div id="qrcode" style="display:grid;place-items:center;margin:12px"></div><div class="join-link" id="joinLink"></div><div class="small">玩家掃描 QR Code，輸入隊名並選擇動物。三隊加入後，再按下方按鈕。</div><button class="primary" style="margin-top:12px" onclick="startGame()">三隊完成，進入新手任務</button></div></div></div>
<div class="player-screen" id="playerScreen"><div class="player-panel"><div id="joinPanel"><div style="font-size:60px">📱🐾</div><h1>加入理財大富翁</h1><input id="joinName" maxlength="12" placeholder="輸入隊伍名稱" style="font-size:19px;padding:14px"><div class="animal-grid" id="animalGrid"></div><button class="primary player-roll" onclick="joinHostRoom()">加入房間</button><div class="small" id="joinStatus">請先輸入隊名並選動物</div></div><div id="playPanel" style="display:none"><div class="player-animal" id="myAnimal">🦁</div><h1 id="myTeam">隊伍</h1><div class="player-status" id="myPosition">位置：START</div><div class="player-status" id="myTurn">等待主持人開始</div><div class="dice" id="playerDice">⚀</div><button class="primary player-roll" id="playerRollBtn" onclick="requestRoll()" disabled>🎲 擲骰</button><div class="small">手機只同步隊名、動物、位置與擲骰狀態，不會顯示資產與排名。</div></div></div></div>

const players = [
 {name:"第一組",animal:"🦁",cash:5000,saving:0,debt:0,pos:0,skip:0,shield:0,newbieDone:false},
 {name:"第二組",animal:"🐼",cash:5000,saving:0,debt:0,pos:0,skip:0,shield:0,newbieDone:false},
 {name:"第三組",animal:"🐧",cash:5000,saving:0,debt:0,pos:0,skip:0,shield:0,newbieDone:false}
];
let current=0,rolling=false,gameStarted=false,newbieIndex=0,timerId=null,timerSeconds=0,soundOn=true,audioCtx=null;
const ANIMALS=["🦁","🦊","🐼","🐧","🐯","🐨","🦉","🐸","🐵","🐢","🐬","🦄"];
let peer=null,hostConnections=new Map(),playerConn=null,mySlot=null,selectedAnimal="";
function isPlayerMode(){return new URLSearchParams(location.search).get("role")==="player"}
function safeStateFor(slot){const p=players[slot];return {type:"state",slot,name:p.name,animal:p.animal,pos:p.pos,position:positionLabel(p.pos),isTurn:slot===current,gameStarted,rolling,dice:document.getElementById("dice")?.textContent||"⚀"}}
function broadcastPlayerState(){hostConnections.forEach((conn,slot)=>{if(conn.open)conn.send(safeStateFor(slot))})}
function startHostRoom(){
 if(typeof Peer==="undefined"){alert("多人連線程式載入失敗，請確認網路連線。");return}
 document.getElementById("roomBox").style.display="block";
 if(peer)return; peer=new Peer();
 peer.on("open",id=>{
  document.getElementById("roomCode").textContent=id.slice(-8).toUpperCase();
  const u=new URL(location.href);u.search="";u.searchParams.set("role","player");u.searchParams.set("room",id);
  const link=u.toString();document.getElementById("joinLink").textContent=link;
  const qrBox=document.getElementById("qrcode");
  qrBox.innerHTML="";
  if(location.protocol==="file:"){
    qrBox.innerHTML='<div style="max-width:480px;padding:16px;border:2px solid #f59e0b;border-radius:12px;background:#fff7ed;color:#9a3412;line-height:1.7"><b>⚠️ 多人模式不能從電腦檔案直接開啟</b><br>請把這份 index.html 上傳到 GitHub Pages，再從 https:// 網址建立房間。</div>';
  }else{
    const img=document.createElement("img");
    img.width=190; img.height=190; img.alt="玩家加入 QR Code";
    img.style.cssText="display:block;background:#fff;padding:8px;border-radius:12px;border:1px solid #dbe3ef";
    img.src="https://api.qrserver.com/v1/create-qr-code/?size=190x190&data="+encodeURIComponent(link);
    img.onerror=()=>{qrBox.innerHTML='<div style="padding:12px;border:1px solid #d1d5db;border-radius:10px;background:#fff">QR Code 載入失敗，請複製下方加入網址。</div>';};
    qrBox.appendChild(img);
  }
 });
 peer.on("connection",conn=>{
  conn.on("data",data=>{
   if(data.type==="join"){
    if(hostConnections.size>=3){conn.send({type:"error",message:"房間已滿"});return}
    if(players.some((p,i)=>hostConnections.has(i)&&p.animal===data.animal)){conn.send({type:"error",message:"這隻動物已被選走"});return}
    const slot=[0,1,2].find(i=>!hostConnections.has(i));
    players[slot].name=(data.name||`第${slot+1}組`).slice(0,12);players[slot].animal=data.animal||ANIMALS[slot];hostConnections.set(slot,conn);
    conn.send({type:"joined",slot});log(`${players[slot].animal} ${players[slot].name} 已用手機加入`);render();syncHostFields();
   }else if(data.type==="roll" && hostConnections.get(data.slot)===conn && data.slot===current && gameStarted && !rolling){rollDice()}
  });
  conn.on("close",()=>{for(const [slot,c] of hostConnections)if(c===conn){hostConnections.delete(slot);log(`${players[slot].name} 手機已離線`);break}});
 });
 peer.on("error",e=>{document.getElementById("joinLink").textContent="連線錯誤："+e.type});
}
function setupPlayerMode(){
 document.getElementById("playerScreen").classList.add("show");document.getElementById("homeScreen").classList.add("hidden");
 document.getElementById("animalGrid").innerHTML=ANIMALS.map(a=>`<button class="animal-btn" onclick="selectAnimal('${a}',this)">${a}</button>`).join("");
}
function selectAnimal(a,btn){selectedAnimal=a;document.querySelectorAll(".animal-btn").forEach(x=>x.classList.remove("selected"));btn.classList.add("selected")}
function joinHostRoom(){
 const name=document.getElementById("joinName").value.trim(),room=new URLSearchParams(location.search).get("room");
 if(!name||!selectedAnimal){document.getElementById("joinStatus").textContent="請輸入隊名並選一隻動物";return}
 if(!room||typeof Peer==="undefined"){document.getElementById("joinStatus").textContent="加入連結無效或網路未連線";return}
 document.getElementById("joinStatus").textContent="連線中…";peer=new Peer();
 peer.on("open",()=>{playerConn=peer.connect(room,{reliable:true});playerConn.on("open",()=>playerConn.send({type:"join",name,animal:selectedAnimal}));playerConn.on("data",handlePlayerData);playerConn.on("close",()=>{document.getElementById("myTurn").textContent="與主持人斷線"})});
 peer.on("error",e=>{document.getElementById("joinStatus").textContent="連線失敗："+e.type});
}
function handlePlayerData(d){
 if(d.type==="error"){document.getElementById("joinStatus").textContent=d.message;return}
 if(d.type==="joined"){mySlot=d.slot;document.getElementById("joinPanel").style.display="none";document.getElementById("playPanel").style.display="block";return}
 if(d.type==="state"){mySlot=d.slot;document.getElementById("myAnimal").textContent=d.animal;document.getElementById("myTeam").textContent=d.name;document.getElementById("myPosition").textContent="位置："+d.position;document.getElementById("playerDice").textContent=d.dice;const enabled=d.gameStarted&&d.isTurn&&!d.rolling;document.getElementById("playerRollBtn").disabled=!enabled;document.getElementById("myTurn").textContent=!d.gameStarted?"等待主持人開始":d.isTurn?(d.rolling?"骰子移動中…":"🎯 輪到你了") : "等待其他隊伍"}

function payOrDebt(player,amount,reason){
 const cost=Math.abs(amount);
 if(player.shield && cost<=player.shield){
  const protectedAmount=player.shield; player.shield=0;
  log(`${player.name} 使用風險防護卡，抵銷 ${money(cost)} 支出（上限 ${money(protectedAmount)}）`);
  return {paid:0,debtAdded:0,shield:true};
 }
 const paid=Math.min(player.cash,cost);
 player.cash-=paid;
 const debtAdded=cost-paid;
 if(debtAdded>0) player.debt=(player.debt||0)+debtAdded;
 return {paid,debtAdded,shield:false};
}
function applyCashEffect(player,amount,reason){
 if(amount<0){
  const r=payOrDebt(player,amount,reason);
  animateMoney(current,"minus");
  if(r.debtAdded>0) log(`${player.name} 現金不足，新增負債 ${money(r.debtAdded)}`);
  return -r.paid;
 }

 animateMoney(current,"add");
 return amount;
}

function loadGame(){const raw=localStorage.getItem("financeMonopolyV6");if(!raw){showModal("找不到存檔","尚未建立遊戲存檔。",[{text:"確認",cls:"primary",fn:closeModal}]);return}const d=JSON.parse(raw);d.players.forEach((p,i)=>Object.assign(players[i],p));current=d.current;gameStarted=d.gameStarted;newbieIndex=d.newbieIndex;document.getElementById("log").innerHTML=d.logs||"";document.getElementById("homeScreen").classList.add("hidden");document.getElementById("phaseNote").textContent=gameStarted?"✅ 已讀取正式遊戲進度":players.every(p=>p.newbieDone)?"✅ 三組新手任務完成，請主持人按「開始遊戲」":"請繼續完成新手任務";render();syncHostFields();showModal("📂 讀檔完成","遊戲進度已恢復。",[{text:"繼續遊戲",cls:"primary",fn:closeModal}])}
function resetGame(){
 if(!confirm("確定要重新開始嗎？目前紀錄會清除。"))return;
 players.forEach(p=>{p.cash=5000;p.saving=0;p.debt=0;p.pos=0;p.skip=0;p.shield=0;p.newbieDone=false});current=0;newbieIndex=0;gameStarted=false;rolling=false;clearTimer();for(const k in decks)shuffled[k]=shuffle(decks[k]);document.getElementById("log").innerHTML="";document.getElementById("dice").textContent="⚀";document.getElementById("phaseNote").textContent="請先完成三組新手任務";closeModal();document.getElementById("homeScreen").classList.remove("hidden");render();log("遊戲已重新開始");
}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()}
function toggleProjection(){document.body.classList.toggle("projection")}
if(isPlayerMode())setupPlayerMode();
document.getElementById("positionSelect").innerHTML=Array.from({length:GOAL_POS+1},(_,i)=>`<option value="${i}">${positionLabel(i)}</option>`).join("");document.getElementById("hostPlayer").addEventListener("change",syncHostFields);render();syncHostFields();log("等待開始：每組起始現金 $5,000");
</script>
</body>
</html>
